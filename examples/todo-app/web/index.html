<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Typewire Todo App</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: system-ui, sans-serif; max-width: 640px; margin: 2rem auto; padding: 0 1rem; }
      h1 { margin-bottom: 1rem; }
      .add-form { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
      .add-form input { flex: 1; padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px; }
      .add-form select { padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px; }
      .add-form button { padding: 0.5rem 1rem; background: #0066cc; color: white; border: none; border-radius: 4px; cursor: pointer; }
      .todo-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem; border-bottom: 1px solid #eee; }
      .todo-item.completed .todo-title { text-decoration: line-through; color: #999; }
      .todo-title { flex: 1; }
      .todo-priority { font-size: 0.75rem; padding: 0.2rem 0.5rem; border-radius: 3px; background: #f0f0f0; }
      .todo-priority.high { background: #ffe0e0; color: #c00; }
      .todo-priority.medium { background: #fff3e0; color: #e65100; }
      .todo-priority.low { background: #e8f5e9; color: #2e7d32; }
      .todo-tags { display: flex; gap: 0.25rem; }
      .todo-tag { font-size: 0.7rem; padding: 0.1rem 0.4rem; border-radius: 3px; background: #e3f2fd; color: #1565c0; }
      .btn-icon { background: none; border: none; cursor: pointer; font-size: 1.1rem; padding: 0.2rem; }
      .stats { margin-top: 1rem; font-size: 0.9rem; color: #666; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
